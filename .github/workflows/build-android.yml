name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK (unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # Firma con il keystore dai secrets se presente, altrimenti
      # produce un APK firmato con la debug key (comunque installabile).
      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "→ Firma con keystore di produzione"
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
            "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" M4TR1X.apk
            "$BUILD_TOOLS/apksigner" sign --ks release.keystore \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASSWORD" \
              M4TR1X.apk
            rm release.keystore
          else
            echo "→ Nessun keystore nei secrets: firmo con la debug key"
            cd android && ./gradlew assembleDebug --no-daemon && cd ..
            cp android/app/build/outputs/apk/debug/app-debug.apk M4TR1X.apk
          fi
          "$BUILD_TOOLS/apksigner" verify M4TR1X.apk
          echo "APK pronto: $(du -h M4TR1X.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: M4TR1X-android
          path: M4TR1X.apk
          retention-days: 30

      # Sui tag v* pubblica l'APK come Release scaricabile da chiunque
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: M4TR1X.apk
          generate_release_notes: true
