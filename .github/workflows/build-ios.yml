name: Build iOS IPA (unsigned)

# Builds an UNSIGNED ipa: users sign it themselves with their own Apple ID
# via AltStore / Sideloadly. No Apple Developer account or secrets needed.
# Rented/enterprise certificates are a kill switch we refuse to depend on.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned .app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/App.app"
          test -d "$APP_PATH" || { echo "::error::App.app not found"; find "$RUNNER_TEMP/DerivedData/Build/Products" -maxdepth 2; exit 1; }
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -qry M4TR1X-unsigned.ipa Payload
          shasum -a 256 M4TR1X-unsigned.ipa > checksums-ios.txt
          cat checksums-ios.txt

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: M4TR1X-iOS-unsigned
          path: |
            ${{ runner.temp }}/ipa/M4TR1X-unsigned.ipa
            ${{ runner.temp }}/ipa/checksums-ios.txt
          retention-days: 30

      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ runner.temp }}/ipa/M4TR1X-unsigned.ipa
            ${{ runner.temp }}/ipa/checksums-ios.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
